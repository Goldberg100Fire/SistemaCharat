<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Incidencias - Municipalidad de Charat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <!-- Header Institucional -->
    <header class="bg-blue-900 text-white p-4 shadow-lg mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white p-1.5 rounded-lg">
                    <i class="fas fa-landmark text-blue-900 text-xl"></i>
                </div>
                <h1 class="font-black text-xl uppercase tracking-tighter">Muni Charat <span class="font-light text-blue-300">2026</span></h1>
            </div>
            <a href="/login" class="text-xs bg-blue-800 hover:bg-blue-700 px-4 py-2 rounded-full transition-colors border border-blue-700 font-bold uppercase tracking-widest">
                <i class="fas fa-user-lock mr-2"></i>Acceso Interno
            </a>
        </div>
    </header>

    <main class="container mx-auto max-w-2xl px-4 pb-12">
        <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-200">
            <div class="bg-blue-600 p-8 text-white text-center">
                <h2 class="text-3xl font-black tracking-tight">Reportar Incidencia</h2>
                <p class="text-blue-100 mt-2 font-medium">Servicio de atenciГіn ciudadana para caserГӯos</p>
            </div>

            <!-- Formulario con soporte para mГәltiples archivos -->
            <form action="/enviar" method="POST" enctype="multipart/form-data" class="p-8 space-y-6">

                <!-- SecciГіn Informante -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">DNI del Informante</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i class="fas fa-id-card"></i>
                            </span>
                            <input type="text" name="dni" required 
                                   inputmode="numeric"
                                   maxlength="8" 
                                   pattern="\d{8}"
                                   title="El DNI debe tener exactamente 8 dГӯgitos numГ©ricos"
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                                   placeholder="8 dГӯgitos" 
                                   class="w-full pl-12 pr-4 py-3 border-2 border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all font-medium">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Nombre Completo</label>
                        <input type="text" name="nombre" required 
                               pattern="^[a-zA-ZГЎГ©ГӯГіГәГҒГүГҚГ“ГҡГұГ‘ ]+$"
                               title="El nombre solo debe contener letras y espacios"
                               oninput="this.value = this.value.replace(/[^a-zA-ZГЎГ©ГӯГіГәГҒГүГҚГ“ГҡГұГ‘ ]/g, '')"
                               placeholder="Nombres y Apellidos"
                               class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-medium">
                    </div>
                </div>

                <!-- UbicaciГіn DinГЎmica -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">CaserГӯo / Sector</label>
                        <select name="caserio" required class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white font-medium cursor-pointer text-sm">
                            <option value="" disabled selected>Seleccione su ubicaciГіn...</option>
                            {% for s in sectores %}
                                <option value="{{ s.nombre }}">[{{ s.tipo }}] {{ s.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">CategorГӯa</label>
                        <select name="categoria" class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white font-medium cursor-pointer text-sm">
                            <option value="Agua y Saneamiento">Agua y Saneamiento</option>
                            <option value="VГӯas y Caminos">VГӯas y Caminos</option>
                            <option value="Alumbrado PГәblico">Alumbrado PГәblico</option>
                            <option value="Limpieza">Limpieza PГәblica</option>
                        </select>
                    </div>
                </div>

                <!-- Evidencia Visual (SOPORTE PARA MГҡLTIPLES FOTOS) -->
                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-1 italic text-blue-600">
                        <i class="fas fa-camera mr-1"></i> Adjuntar Evidencias Visuales
                    </label>
                    <p class="text-[10px] text-slate-400 mb-2">Puedes seleccionar varias fotos de una sola vez.</p>
                    <div class="relative group">
                        <!-- Se aГұadiГі el atributo 'multiple' -->
                        <input type="file" name="foto" accept="image/*" multiple 
                               class="w-full px-4 py-3 border-2 border-dashed border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 font-medium cursor-pointer file:mr-4 file:py-1 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-600 file:text-white hover:border-blue-300 transition-all text-xs text-slate-500">
                    </div>
                </div>

                <!-- DescripciГіn -->
                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">DescripciГіn del Problema</label>
                    <textarea name="descripcion" rows="3" required placeholder="Indique referencias o detalles especГӯficos..." 
                              class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none resize-none font-medium text-sm"></textarea>
                </div>

                <!-- Campos de Geo-localizaciГіn -->
                <input type="hidden" name="latitud" id="lat">
                <input type="hidden" name="longitud" id="lng">

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-200 transition-all active:scale-95 flex justify-center items-center gap-3 uppercase tracking-widest text-sm">
                    <i class="fas fa-paper-plane"></i>
                    Enviar Reporte Municipal
                </button>
            </form>
        </div>

        <footer class="mt-8 text-center text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em]">
            &copy; 2026 Municipalidad Distrital de Charat - Oficina de TI
        </footer>
    </main>

    <script>
        // Captura automГЎtica de coordenadas GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                document.getElementById('lat').value = pos.coords.latitude;
                document.getElementById('lng').value = pos.coords.longitude;
            }, (err) => {
                console.warn("UbicaciГіn denegada o no disponible.");
            }, {
                enableHighAccuracy: true
            });
        }
    </script>
</body>
</html>

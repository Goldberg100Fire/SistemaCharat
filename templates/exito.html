<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Exitoso - MuniCharat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 text-center border border-slate-100">
        <!-- Icono de Éxito Animado -->
        <div class="mb-6 flex justify-center">
            <div class="bg-green-100 p-6 rounded-full inline-flex items-center justify-center shadow-inner shadow-green-200">
                <i class="fas fa-check-circle text-6xl text-green-600 animate-bounce"></i>
            </div>
        </div>

        <h1 class="text-3xl font-black text-slate-800 tracking-tighter mb-2">¡Reporte Recibido!</h1>
        <p class="text-slate-500 font-medium leading-relaxed mb-8">
            Gracias por colaborar con el distrito. Tu reporte ha sido registrado en el sistema municipal y será derivado al área correspondiente.
        </p>

        <div class="bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-8">
            <div class="flex items-center gap-3 text-left">
                <i class="fas fa-info-circle text-blue-600 text-lg"></i>
                <p class="text-[11px] text-blue-800 font-bold uppercase tracking-widest leading-none">
                    Estado Actual: <span class="text-blue-600">Pendiente de Revisión</span>
                </p>
            </div>
        </div>

        <a href="/" class="group w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl shadow-slate-200 transition-all active:scale-95 flex justify-center items-center gap-3 hover:bg-blue-600 uppercase tracking-widest text-xs">
            <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
            Volver al Inicio
        </a>
        
        <p class="mt-8 text-[10px] text-slate-300 font-bold uppercase tracking-[0.3em]">
            Muni Charat &bull; Gestión 2026
        </p>
    </div>

</body>
</html>
